<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Echo - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title">Word Echo</h1>
            <div class="game-info">
                <span id="score-display">0 points</span>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">5</span></span>
                    <span id="score">0 points</span>
                    <div class="high-score-container">
                        <span>🏆 Best: </span>
                        <span id="high-score-text">--</span>
                    </div>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="audio-card" id="audio-card">
                <h2>Repeat the word</h2>

                <div id="difficulty-badge" class="difficulty-badge"></div>

                <div id="image-display" class="image-display">
                    <img id="current-image" src="" alt="Word image">
                </div>

                <div class="audio-controls">
                    <button id="play-button" class="audio-button primary">
                        <i class="fas fa-volume-up"></i> Listen to word
                    </button>
                    <button id="record-button" class="audio-button red">
                        <i class="fas fa-microphone"></i> Record my voice
                    </button>
                </div>

                <div id="recorded-text" class="recorded-text">
                    <p>What you recorded:</p>
                    <p id="recorded-text-content"></p>
                </div>

                <div id="similarity-meter" class="similarity-meter">
                    <div class="similarity-label">Similarity:</div>
                    <div class="similarity-bar">
                        <div id="similarity-fill" class="similarity-fill"></div>
                    </div>
                    <div id="similarity-text" class="similarity-text">0%</div>
                </div>

                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>
                    💡 <span style="font-weight: 700;">Tip:</span> Listen carefully to the word and try to repeat it as closely as possible.
                </p>
            </div>
        </main>
    </div>

    <script src="pronunciation-analyzer.js"></script>
    <script src="script.js"></script>
</body>
</html>
