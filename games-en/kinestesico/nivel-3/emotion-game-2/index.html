<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Emotion Game - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button"><button onclick="goToMainPage()"><i class="fas fa-arrow-left"></i> Back</button></div>
            <h1 class="game-title">Simple Emotional Story</h1>
            <div class="game-info"><span id="score-display">0 points</span></div>
        </header>
        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">3</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            </div>
            <div class="emotion-card">
                <h2>Watch the Scene 🎬</h2>
                <div class="gif-section">
                    <div class="gif-container">
                        <div class="gif-placeholder" id="gifPlaceholder">
                            <img id="emotionGif" src="" alt="Emotion" style="width:100%;height:100%;object-fit:contain;">
                        </div>
                    </div>
                </div>
                <div id="feedback" class="feedback hidden"><span id="feedback-text"></span></div>
                <div class="camera-section">
                    <h3>🎭 Now Imitate the Emotion</h3>
                    <div class="camera-controls">
                        <button class="camera-btn start" id="startCameraBtn" onclick="startCamera()"><i class="fas fa-video"></i> Start Camera</button>
                        <button class="camera-btn stop" id="stopCameraBtn" onclick="stopCamera()" style="display:none;"><i class="fas fa-stop"></i> Stop</button>
                    </div>
                    <div class="camera-container">
                        <div class="camera-feed" id="cameraFeedContainer">
                            <video id="cameraFeed" style="display:none;"></video>
                            <span id="cameraPlaceholder">Camera will open here</span>
                        </div>
                    </div>
                    <div class="simple-analysis" id="simpleAnalysis" style="display:none;">
                        <h4>✨ Emotion Detection</h4>
                        <div class="analysis-item">
                            <span class="analysis-label">Emotional State:</span>
                            <span class="analysis-value" id="emotionStatus">Detecting...</span>
                        </div>
                    </div>
                </div>
                <div class="options-section">
                    <h3>Which emotion is it? 👇</h3>
                    <div id="options-container" class="options-container"></div>
                </div>
            </div>
            <div class="instructions-card">
                <p>💡 <span class="font-bold">How to play:</span> Watch the GIF, imitate the emotion with your face, then select which emotion it is.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
