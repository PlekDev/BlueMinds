<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narração Emocional Simples - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Narração Emocional Simples</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
            </div>
        </header>

        <main class="game-content">
            <!-- Progresso -->
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">3</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Card Principal do Jogo -->
            <div class="emotion-card">
                <h2>Observe a Cena 🎬</h2>

                <!-- Exibição de GIF -->
                <div class="gif-section">
                    <div class="gif-container">
                        <div class="gif-placeholder" id="gifPlaceholder">
                            <img id="emotionGif" src="" alt="Emoção" style="width: 100%; height: 100%; object-fit: contain;">
                        </div>
                    </div>
                </div>

                <!-- Feedback Simples -->
                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>

                <!-- Seção da Câmera para Imitação -->
                <div class="camera-section">
                    <h3>🎭 Agora Imite a Emoção</h3>

                    <div class="camera-controls">
                        <button class="camera-btn start" id="startCameraBtn" onclick="startCamera()">
                            <i class="fas fa-video"></i> Iniciar Câmera
                        </button>
                        <button class="camera-btn stop" id="stopCameraBtn" onclick="stopCamera()" style="display: none;">
                            <i class="fas fa-stop"></i> Parar
                        </button>
                    </div>

                    <div class="camera-container">
                        <div class="camera-feed" id="cameraFeedContainer">
                            <video id="cameraFeed" style="display: none;"></video>
                            <span id="cameraPlaceholder">A câmera será aberta aqui</span>
                        </div>
                    </div>

                    <!-- Análise Simples -->
                    <div class="simple-analysis" id="simpleAnalysis" style="display: none;">
                        <h4>✨ Detecção de Emoção</h4>
                        <div class="analysis-item">
                            <span class="analysis-label">Estado Emocional:</span>
                            <span class="analysis-value" id="emotionStatus">Detectando...</span>
                        </div>
                    </div>
                </div>

                <!-- Seleção de Emoção -->
                <div class="options-section">
                    <h3>Qual é a emoção? 👇</h3>
                    <div id="options-container" class="options-container">
                        <!-- As opções serão geradas dinamicamente -->
                    </div>
                </div>
            </div>

            <!-- Instruções -->
            <div class="instructions-card">
                <p>
                    💡 <span class="font-bold">Como jogar:</span> Veja o GIF, tente imitar a emoção com seu rosto, e selecione qual é.
                </p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
