<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontre o Erro Gramatical - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Encontre o Erro</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
                <span class="difficulty-badge" id="difficulty-badge">Normal</span>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="error-card">
                <h2>Qual é o erro?</h2>

                <div class="sentence-section">
                    <div class="sentence-label">Leia a frase:</div>
                    <div class="sentence-display">
                        <span id="sentence-text"></span>
                    </div>
                </div>

                <div id="error-hint" class="error-hint hidden">
                    <i class="fas fa-lightbulb"></i>
                    <span id="hint-text"></span>
                </div>

                <div class="correction-section">
                    <div class="correction-label">Selecione a palavra correta:</div>
                    <div id="options-container" class="options-container"></div>
                </div>

                <div class="word-type-badge" id="word-type-badge"></div>

                <div class="action-controls">
                    <button id="hint-button" class="action-button hint" title="Ver dica">
                        <i class="fas fa-lightbulb"></i> Dica
                    </button>
                    <button id="check-button" class="action-button primary">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button id="reset-button" class="action-button blue">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>

                <div id="feedback" class="feedback hidden"></div>

                <div id="explanation" class="explanation hidden">
                    <h3>Explicação</h3>
                    <p id="explanation-text"></p>
                </div>
            </div>

            <div class="instructions-card">
                <p>💡 <span style="font-weight: 700;">Dica:</span> Leia a frase com atenção. Encontre qual palavra está errada e como deveria ser. Use a dica se precisar!</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
