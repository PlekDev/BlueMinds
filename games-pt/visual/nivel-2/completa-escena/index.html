<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete a Cena - BlueMinds IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Complete a Cena IA</h1>
            <div class="ai-status">
                <span id="score-display">0 pontos</span>
                <button class="audio-toggle" onclick="toggleAudio()" title="Ativar/Desativar áudio">
                    <i class="fas fa-volume-up"></i>
                </button>
                <div class="ai-indicator" title="IA adaptativa ativa">
                    <i class="fas fa-robot"></i>
                    <span>IA</span>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="game-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>
                <div id="hint-box" class="hint-box" style="display: none;"></div>
                <h2>Complete a frase!</h2>
                <div class="sentence-display" id="sentence-display"></div>
                <p style="font-size: 16px; margin-bottom: 15px; color: #777;">Selecione a imagem correta:</p>
                <div class="options-display" id="options-display"></div>

                <div class="action-buttons">
                    <button class="action-button primary" onclick="checkAnswer()">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button class="action-button secondary" onclick="resetAnswer()">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>

                <div id="feedback" class="feedback"><span id="feedback-text"></span></div>
                <div id="ai-analysis" class="ai-analysis">
                    <strong>📊 Análise IA:</strong> <span id="analysis-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>IA Adaptativa:</strong> O sistema ajusta o tipo de frase e distratores de acordo com seu desempenho em categorização visual-verbal.</p>
            </div>
        </main>
    </div>

    <script>
        class AudioManager {
            constructor() { this.synth = window.speechSynthesis; this.audioEnabled = true; }
            speak(text, rate = 1) {
                if (!this.audioEnabled) return;
                this.synth.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.rate = rate; u.pitch = 1.0; u.volume = 1.0; u.lang = 'pt-BR';
                this.synth.speak(u);
            }
            toggleAudio() { this.audioEnabled = !this.audioEnabled; return this.audioEnabled; }
        }
        const audioManager = new AudioManager();
        function toggleAudio() {
            const isEnabled = audioManager.toggleAudio();
            document.querySelector('.audio-toggle').innerHTML = isEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            if (isEnabled) audioManager.speak('Áudio ativado');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
