<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Padrões - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Jogo de Padrões</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
                <button class="audio-toggle" id="audioToggle" title="Ativar/Desativar áudio">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="pattern-card">
                <h2>O que falta no padrão?</h2>

                <div id="pattern-display" class="pattern-display"></div>

                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>

                <div id="options-container" class="options-container"></div>
            </div>

            <div class="instructions-card">
                <p>💡 <span class="font-bold">Dica:</span> Encontre o que se repete no padrão e complete a sequência.</p>
            </div>
        </main>
    </div>

    <script>
        class AudioManager {
            constructor() { this.synth = window.speechSynthesis; this.audioEnabled = true; }
            speak(text, rate = 1) { if (!this.audioEnabled) return; this.synth.cancel(); const u = new SpeechSynthesisUtterance(text); u.rate = rate; u.pitch = 1.0; u.volume = 1.0; u.lang = 'pt-BR'; this.synth.speak(u); }
            toggleAudio() { this.audioEnabled = !this.audioEnabled; return this.audioEnabled; }
        }
        const audioManager = new AudioManager();
        document.getElementById('audioToggle').addEventListener('click', function() {
            const isEnabled = audioManager.toggleAudio();
            this.innerHTML = isEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            if (isEnabled) audioManager.speak('Áudio ativado');
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
