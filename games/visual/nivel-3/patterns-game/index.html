<!DOCTYPE html>
<html lang="es" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Patrones - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
             <div class="back-button">
                <button onclick="goToMainPage()">
                 <i class="fas fa-arrow-left"></i> <span data-i18n="game_ui.back">Volver</span>
             </button>
            </div>
            <h1 class="game-title">Juego de Patrones</h1>
            <div class="game-info" style="display:flex;align-items:center;gap:15px;"><div id="lang-picker-anchor"></div>
                <span id="score-display" data-i18n="game_ui.zero_points">0 puntos</span>
                <button class="audio-toggle" id="audioToggle" title="Activar/Desactivar audio">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </header>

        <main class="game-content">
            <!-- Progress -->
            <div class="progress-card">
                <div class="progress-header">
                    <span data-i18n="game_ui.round_word">Ronda</span> <span id="current-round">1</span> <span data-i18n="game_ui.of">de</span> <span id="total-rounds">5</span>
                    <span id="score" data-i18n="game_ui.zero_points">0 puntos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Pattern Display -->
            <div class="pattern-card">
                <h2>¿Qué falta en el patrón?</h2>
                
                <div id="pattern-display" class="pattern-display">
                    <!-- Los elementos del patrón se generarán dinámicamente -->
                </div>
                
                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>

                <div id="options-container" class="options-container">
                    <!-- Las opciones se generarán dinámicamente -->
                </div>
            </div>

            <!-- Instructions -->
            <div class="instructions-card">
                <p>
                    💡 <span class="font-bold">Tip:</span> <span data-i18n="game_ui.tip_13">Busca qué se repite en el patrón y completa la secuencia.</span></p>
            </div>
        </main>
    </div>

    <script>
        // ===== AUDIO MANAGER =====
        class AudioManager {
            constructor() {
                this.synth = window.speechSynthesis;
                this.audioEnabled = true;
            }
            speak(text, rate = 1) {
                if (!this.audioEnabled) return;
                this.synth.cancel();
                const utterance = new SpeechSynthesisUtterance(typeof tg === 'function' ? tg(text) : text);
                utterance.rate = rate;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                utterance.lang = (localStorage.getItem('blueminds_lang') || 'es') + '-' + (localStorage.getItem('blueminds_lang') === 'en' ? 'US' : localStorage.getItem('blueminds_lang') === 'pt' ? 'BR' : 'ES');
                this.synth.speak(utterance);
            }
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                return this.audioEnabled;
            }
        }

        const audioManager = new AudioManager();

        document.getElementById('audioToggle').addEventListener('click', function() {
            const isEnabled = audioManager.toggleAudio();
            if (isEnabled) {
                this.innerHTML = '<i class="fas fa-volume-up"></i>';
                audioManager.speak('Audio activado');
            } else {
                this.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        });
    </script>

    <script src="script.js"></script>
    <script src="../../../../js/game-translations.js"></script>
    <script src="../../../../js/i18n.js"></script>
</body>
</html>
