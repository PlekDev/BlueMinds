<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz para Niños - BlueMinds</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/quiz-ninos.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="quiz-container" class="container">
            <div class="card">
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill" style="width: 0%">
                        <span id="progress-text">0%</span>
                    </div>
                </div>

                <h2 id="question-title" class="question-title"></h2>
                <p id="question-subtitle" class="question-subtitle"></p>

                <div id="question-content"></div>

                <button id="verify-button" class="action-button" onclick="checkAnswer()" disabled data-i18n="quiz.verify">
                    VERIFICAR RESPUESTA
                </button>

                <div id="feedback"></div>
            </div>
        </div>

        <div id="results-container" class="hidden">
            <div class="card results-container">
                <div class="trophy-icon">
                    <i class="fas fa-trophy" style="font-size: 4rem; color: white;"></i>
                </div>
                <h2 class="results-title" data-i18n="quiz.excellent">¡Excelente Trabajo! 🎉</h2>
                <p style="font-size: 1.125rem; color: var(--gray-600); margin-bottom: 2rem;" data-i18n="quiz.completed_all">
                    Has completado todas las preguntas
                </p>

                <div class="results-stats">
                    <div class="stat-box">
                        <div class="stat-number" id="total-questions">20</div>
                        <div class="stat-label" data-i18n="quiz.questions">Preguntas</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="correct-answers">0</div>
                        <div class="stat-label" data-i18n="quiz.correct">Correctas</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="completion-time">0m</div>
                        <div class="stat-label" data-i18n="quiz.time">Tiempo</div>
                    </div>
                </div>

                <div style="background: var(--gray-50); padding: 1.5rem; border-radius: 1rem; margin-top: 2rem;">
                    <h3 style="color: var(--gray-800); margin-bottom: 1rem;" data-i18n="quiz.analysis_title">📊 Análisis de Aprendizaje</h3>
                    <div id="learning-analysis" style="text-align: left; color: var(--gray-700);"></div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button onclick="location.reload()" class="action-button" style="flex: 1;" data-i18n="quiz.restart">
                        Volver a Empezar
                    </button>
                    <button onclick="goToMainApp()" class="action-button" style="flex: 1; background: linear-gradient(135deg, var(--blue-500), var(--blue-600));" data-i18n="quiz.go_app">
                        Ir a la App
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../api.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        let isProcessing = false;
        let currentQuestionType = '';
        let draggedValue = null;
        let currentQuestionIndex = 0;
        let answers = [];
        let selectedAnswer = null;
        let showFeedback = false;
        let score = 0;
        let startTime = Date.now();
        let currentAudio = null;
        let questionStartTime = Date.now();
        const verifyBtn = document.getElementById('verify-button');
        let currentSessionId = null;

        const questions = [
            { type: 'sequence', nivel: 1, learningStyle: 'visual', question: 'Ordena la secuencia correcta', subtitle: 'Arrastra los emojis en el orden correcto', sequence: ['👤', '🍽️', '🍎'], options: ['🍎', '👤', '🍽️'], correct: ['👤', '🍽️', '🍎'] },
            { type: 'complete-sequence', nivel: 1, learningStyle: 'visual', question: '¿Qué imagen falta?', subtitle: 'Selecciona la imagen que completa la secuencia', sequence: ['🚶', '🏫', '?', '🪑'], options: [{ emoji: '🚗', value: 'carro' }, { emoji: '🎒', value: 'mochila' }, { emoji: '📚', value: 'libros' }], correct: 'libros' },
            { type: 'image-to-word', nivel: 2, learningStyle: 'visual', question: 'Selecciona la palabra correcta', subtitle: 'Mira la imagen y elige la palabra', image: '🌸', options: ['Flor', 'Helado', 'Vaca'], correct: 'Flor' },
            { type: 'word-to-image', nivel: 3, learningStyle: 'visual', question: '¿La imagen corresponde a la palabra?', subtitle: 'Verifica si cada imagen es correcta', pairs: [{ word: 'Vaca', image: '🐮', correct: true }, { word: 'Manzana', image: '🍎', correct: true }, { word: 'Escuela', image: '🏫', correct: true }], currentPair: 0 },
            { type: 'sound-complete', nivel: 1, learningStyle: 'auditivo', question: 'Escucha y completa', subtitle: 'Elige la imagen correcta', audioText: 'Yo como manza', soundFile: null, options: [{ emoji: '🍎', label: 'Manzana', value: 'manzana' }, { emoji: '🐱', label: 'Gato', value: 'gato' }, { emoji: '🏠', label: 'Casa', value: 'casa' }], correct: 'manzana' },
            { type: 'order-words', nivel: 2, learningStyle: 'auditivo', question: 'Ordena las palabras', subtitle: 'Escucha y ordena para formar la oración', audioText: 'Papá come manzana', soundFile: null, words: ['Manzana', 'come', 'Papá'], correct: ['Papá', 'come', 'Manzana'] },
            { type: 'sound', nivel: 1, learningStyle: 'auditivo', question: 'Escucha y selecciona el animal', subtitle: 'Presiona el botón para escuchar', soundFile: '../sonidos/vaca.mp3', options: [{ animal: 'Vaca', emoji: '🐮', value: 'vaca' }, { animal: 'Cerdo', emoji: '🐷', value: 'cerdo' }, { animal: 'Pollo', emoji: '🐔', value: 'pollo' }], correct: 'vaca' },
            { type: 'sound', nivel: 2, learningStyle: 'auditivo', question: 'Escucha y selecciona el animal', subtitle: 'Presiona el botón para escuchar', soundFile: '../sonidos/perro.mp3', options: [{ animal: 'Perro', emoji: '🐕', value: 'perro' }, { animal: 'Gato', emoji: '🐈', value: 'gato' }, { animal: 'Pájaro', emoji: '🐦', value: 'pajaro' }], correct: 'perro' },
            { type: 'sound', nivel: 3, learningStyle: 'auditivo', question: 'Escucha y selecciona el animal', subtitle: 'Presiona el botón para escuchar', soundFile: '../sonidos/gato.mp3', options: [{ animal: 'León', emoji: '🦁', value: 'leon' }, { animal: 'Gato', emoji: '🐈', value: 'gato' }, { animal: 'Tigre', emoji: '🐯', value: 'tigre' }], correct: 'gato' },
            { type: 'drag-sequence', nivel: 1, learningStyle: 'kinestesico', question: 'Arrastra y ordena', subtitle: 'Toca y arrastra cada emoji al lugar correcto', sequence: ['🌅', '☀️', '🌙'], options: ['🌙', '☀️', '🌅'], correct: ['🌅', '☀️', '🌙'] },
            { type: 'image-to-word', nivel: 2, learningStyle: 'kinestesico', question: 'Toca la respuesta correcta', subtitle: 'Mira y selecciona la palabra', image: '🚗', options: ['Carro', 'Casa', 'Comida'], correct: 'Carro' },
            { type: 'complete-sequence', nivel: 2, learningStyle: 'kinestesico', question: 'Completa tocando', subtitle: 'Toca la imagen correcta', sequence: ['🍞', '🧈', '?', '🍴'], options: [{ emoji: '🥛', value: 'leche' }, { emoji: '🔪', value: 'cuchillo' }, { emoji: '🧂', value: 'sal' }], correct: 'cuchillo' },
            { type: 'word-to-image', nivel: 3, learningStyle: 'kinestesico', question: 'Verifica tocando', subtitle: '¿La imagen es correcta?', pairs: [{ word: 'Pelota', image: '⚽', correct: true }, { word: 'Libro', image: '📚', correct: true }], currentPair: 0 },
            { type: 'drag-sequence', nivel: 3, learningStyle: 'kinestesico', question: 'Organiza arrastrando', subtitle: 'Del más pequeño al más grande', sequence: ['🐜', '🐕', '🐘'], options: ['🐘', '🐜', '🐕'], correct: ['🐜', '🐕', '🐘'] },
            { type: 'image-to-word', nivel: 1, learningStyle: 'lectoescritura', question: 'Lee y selecciona', subtitle: 'Mira la imagen y elige la palabra escrita', image: '☀️', options: ['Sol', 'Luna', 'Estrella'], correct: 'Sol' },
            { type: 'order-words', nivel: 2, learningStyle: 'lectoescritura', question: 'Ordena la oración', subtitle: 'Toca las palabras en orden', audioText: 'El gato come pescado', soundFile: null, words: ['pescado', 'gato', 'come', 'El'], correct: ['El', 'gato', 'come', 'pescado'] },
            { type: 'image-to-word', nivel: 2, learningStyle: 'lectoescritura', question: 'Lee la palabra', subtitle: 'Selecciona la palabra que corresponde', image: '🌳', options: ['Árbol', 'Flor', 'Pasto'], correct: 'Árbol' },
            { type: 'complete-sequence', nivel: 3, learningStyle: 'lectoescritura', question: 'Completa la secuencia', subtitle: 'Lee y selecciona', sequence: ['📖', '✏️', '?', '🎓'], options: [{ emoji: '📝', value: 'escribir' }, { emoji: '🎮', value: 'jugar' }, { emoji: '🍕', value: 'comer' }], correct: 'escribir' },
            { type: 'word-to-image', nivel: 3, learningStyle: 'lectoescritura', question: 'Verifica la palabra', subtitle: '¿La imagen corresponde?', pairs: [{ word: 'Mariposa', image: '🦋', correct: true }, { word: 'Nube', image: '☁️', correct: true }], currentPair: 0 },
            { type: 'order-words', nivel: 3, learningStyle: 'lectoescritura', question: 'Forma la oración', subtitle: 'Ordena las palabras correctamente', audioText: 'María juega en el parque', soundFile: null, words: ['juega', 'parque', 'el', 'en', 'María'], correct: ['María', 'juega', 'en', 'el', 'parque'] }
        ];

        async function loadQuizProgress() {
            try {
                const response = await fetch(`${api.baseURL}/quiz/progress`, { headers: api._getHeaders() });
                if (!response.ok) throw new Error('Error al obtener progreso');
                const data = await response.json();
                if (data.progress && data.progress.id) currentSessionId = data.progress.id;
                if (data.progress && !data.progress.is_completed) {
                    currentQuestionIndex = Math.min(data.progress.current_question_index, questions.length - 1);
                    if (currentQuestionIndex >= questions.length) { alert('¡Parece que ya completaste este quiz!'); return; }
                    alert(`${I18n.t('quiz.welcome_back')} ${currentQuestionIndex + 1}`);
                }
            } catch (err) {
                console.error('Error cargando progreso:', err);
            }
            render();
        }

        let sequenceAnswer = [];
        let wordOrderAnswer = [];
        let pairAnswers = [];

        function playSound() {
            const current = questions[currentQuestionIndex];
            if (current.soundFile) {
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
                currentAudio = new Audio(current.soundFile);
                currentAudio.play().catch(e => console.log('Error reproduciendo audio:', e));
            } else if (current.audioText) {
                const utterance = new SpeechSynthesisUtterance(current.audioText);
                utterance.lang = 'es-ES'; utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            }
        }

        function handleSelection(value) {
            selectedAnswer = value;
            document.getElementById('verify-button').disabled = false;
            render();
        }

        function handleWordClick(word) {
            const index = wordOrderAnswer.indexOf(word);
            if (index > -1) {
                wordOrderAnswer.splice(index, 1);
            } else {
                const current = questions[currentQuestionIndex];
                if (wordOrderAnswer.length < current.correct.length) wordOrderAnswer.push(word);
            }
            updateVerifyButtonState();
            render();
        }

        function handlePairAnswer(answer) {
            const current = questions[currentQuestionIndex];
            pairAnswers.push(answer);
            showFeedback = true;
            document.getElementById('feedback').innerHTML = `
                <div class="feedback-box ${answer ? 'correct' : 'incorrect'}">
                    <i class="fas fa-${answer ? 'check-circle' : 'times-circle'}" style="font-size: 2rem; color: ${answer ? 'var(--green-600)' : 'var(--red-500)'}"></i>
                    <div style="margin-left: 1rem;">
                        <strong>${answer ? I18n.t('quiz.correct_ans') : I18n.t('quiz.incorrect_ans')}</strong><br>
                        ${answer ? I18n.t('quiz.well_seen') : I18n.t('quiz.review_image')}
                    </div>
                </div>`;
            if (pairAnswers.length < current.pairs.length) {
                current.currentPair++;
                render();
            } else {
                selectedAnswer = pairAnswers.every(a => a === true);
                document.getElementById('verify-button').disabled = false;
                if (currentQuestionIndex === questions.length - 1) {
                    document.getElementById('verify-button').textContent = I18n.t('quiz.finish');
                    document.getElementById('verify-button').onclick = completeGame;
                } else {
                    document.getElementById('verify-button').textContent = I18n.t('quiz.next');
                    document.getElementById('verify-button').onclick = nextQuestion;
                }
            }
        }

        async function checkAnswer() {
            if (isProcessing) return;
            isProcessing = true;
            verifyBtn.disabled = true;
            const current = questions[currentQuestionIndex];
            const responseTimeMs = Date.now() - questionStartTime;
            let isCorrect = false;

            if (['sequence', 'drag-sequence', 'complete-sequence'].includes(current.type)) {
                const userAnswer = current.type === 'complete-sequence' ? sequenceAnswer[0] : sequenceAnswer;
                isCorrect = JSON.stringify(userAnswer) === JSON.stringify(current.correct);
            } else if (current.type === 'order-words') {
                isCorrect = JSON.stringify(wordOrderAnswer) === JSON.stringify(current.correct);
            } else if (current.type === 'word-to-image') {
                isCorrect = pairAnswers.every(a => a === true);
            } else {
                isCorrect = selectedAnswer === current.correct || selectedAnswer === true;
            }

            if (isCorrect) score++;

            answers[currentQuestionIndex] = {
                questionIndex: currentQuestionIndex, nivel: current.nivel,
                learningStyle: current.learningStyle, correct: isCorrect,
                answer: selectedAnswer || sequenceAnswer || wordOrderAnswer || pairAnswers || [],
                responseTimeMs
            };

            try {
                await api.saveQuizResponse({
                    quiz_session_id: currentSessionId,
                    question_index: currentQuestionIndex,
                    question_type: current.type,
                    learning_style: current.learningStyle,
                    nivel: current.nivel,
                    answer: selectedAnswer || sequenceAnswer || wordOrderAnswer || pairAnswers || [],
                    is_correct: isCorrect,
                    response_time_ms: responseTimeMs
                });
            } catch (err) { console.error('Error guardando respuesta:', err); }

            showFeedback = true;
            document.getElementById('feedback').innerHTML = `
                <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}">
                    <i class="fas fa-${isCorrect ? 'check-circle' : 'times-circle'}" style="font-size: 2rem; color: ${isCorrect ? 'var(--green-600)' : 'var(--red-500)'}"></i>
                    <div>
                        <div style="font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem;">
                            ${isCorrect ? I18n.t('quiz.great') : I18n.t('quiz.recorded')}
                        </div>
                        <div style="color: var(--gray-600);">
                            ${isCorrect ? I18n.t('quiz.keep_going') : I18n.t('quiz.continue_next')}
                        </div>
                    </div>
                </div>`;

            if (isCorrect) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#60a5fa', '#93c5fd'] });

            verifyBtn.disabled = true;

            if (currentQuestionIndex === questions.length - 1) {
                setTimeout(() => { completeGame(); }, 1500);
            } else {
                verifyBtn.textContent = I18n.t('quiz.next');
                verifyBtn.onclick = nextQuestion;
                verifyBtn.disabled = false;
            }
            setTimeout(() => {
                isProcessing = false;
                if (currentQuestionIndex !== questions.length - 1) verifyBtn.disabled = false;
            }, 1500);
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                const current = questions[currentQuestionIndex];
                selectedAnswer = null; pairAnswers = []; showFeedback = false;

                if (['sequence', 'drag-sequence', 'complete-sequence'].includes(current.type)) {
                    let slots = current.correct ? current.correct.length : 1;
                    if (current.sequence) slots = current.sequence.filter(s => s === '?').length || slots;
                    sequenceAnswer = new Array(slots).fill(null);
                } else if (current.type === 'order-words') {
                    wordOrderAnswer = new Array(current.correct.length).fill(null);
                }

                document.getElementById('feedback').innerHTML = '';
                const vBtn = document.getElementById('verify-button');
                vBtn.textContent = I18n.t('quiz.verify');
                vBtn.onclick = checkAnswer;
                vBtn.disabled = true;

                if (current.type === 'word-to-image') current.currentPair = 0;
                questionStartTime = Date.now();
                render();
            }
        }

        async function completeGame() {
            const endTime = Date.now();
            const totalTimeSeconds = Math.round((endTime - startTime) / 1000);
            const timeInMinutes = Math.round(totalTimeSeconds / 60);

            const styleNames = {
                visual: '👁️ ' + I18n.t('main.cat_visual'),
                auditivo: '👂 ' + I18n.t('main.cat_auditivo'),
                kinestesico: '✋ ' + I18n.t('main.cat_kines'),
                lectoescritura: '📖 ' + I18n.t('main.cat_lecto'),
                'No detectado': I18n.t('quiz.not_detected')
            };

            try {
                const response = await fetch(`${api.baseURL}/quiz/complete`, {
                    method: 'POST',
                    headers: api._getHeaders(),
                    body: JSON.stringify({ answers })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Error del servidor: ${response.status}`);
                }

                const data = await response.json();
                score = data.score || score;
                const bestStyle = data.bestStyle || 'No detectado';
                const suggestedLevel = data.suggestedLevel || 1;
                const learningStats = data.learningStats || {};
                const recommendations = data.recommendations || [];

                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('correct-answers').textContent = score;
                document.getElementById('completion-time').textContent = timeInMinutes + 'm';

                let analysisHTML = `
                    <p style="margin-bottom: 1rem;"><strong>🎯 ${I18n.t('quiz.dominant_style')}:</strong> ${styleNames[bestStyle] || bestStyle}</p>
                    <p style="margin-bottom: 1rem;"><strong>📊 ${I18n.t('quiz.suggested_level')}:</strong> ${I18n.t('sel.level')} ${suggestedLevel}</p>`;

                if (Object.keys(learningStats).length > 0) {
                    analysisHTML += `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--gray-300);"><p style="font-weight: 600; margin-bottom: 0.5rem;">${I18n.t('quiz.breakdown')}:</p>`;
                    for (let style in learningStats) {
                        const stats = learningStats[style];
                        const percentage = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                        analysisHTML += `<div style="margin-bottom: 0.5rem;">${styleNames[style] || style}: ${stats.correct}/${stats.total} (${percentage}%)</div>`;
                    }
                    analysisHTML += `</div>`;
                }

                if (recommendations.length > 0) {
                    analysisHTML += `<div class="analysis-item" style="margin-top: 1.5rem;"><strong>${I18n.t('quiz.personalized_recs')}:</strong><br>${recommendations.map(rec => `• ${rec}<br>`).join('')}</div>`;
                }

                document.getElementById('learning-analysis').innerHTML = analysisHTML;
                if (score >= 15) confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });

                localStorage.setItem('blueminds_test_completed', 'true');
                localStorage.setItem('blueminds_user_type', 'child');
                localStorage.setItem('blueminds_learning_style', bestStyle);
                localStorage.setItem('blueminds_suggested_level', suggestedLevel);
                localStorage.setItem('blueminds_score', score);

            } catch (err) {
                console.error('Error en completeGame:', err);
                // fallback local calc omitted for brevity – same logic as original
                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('results-container').classList.remove('hidden');
                document.getElementById('correct-answers').textContent = score;
                document.getElementById('completion-time').textContent = timeInMinutes + 'm';
                document.getElementById('learning-analysis').innerHTML = `<p style="color: orange;">(${I18n.t('quiz.fallback_mode')})</p>`;
            }
        }

        function goToMainApp() { window.location.href = 'BlueMindsMain.html'; }

        function render() {
            if (currentQuestionIndex < 0 || currentQuestionIndex >= questions.length) currentQuestionIndex = 0;

            const current = questions[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            currentQuestionType = current.type;

            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-text').textContent = Math.round(progress) + '%';
            document.getElementById('question-title').textContent = current.question;
            document.getElementById('question-subtitle').textContent = current.subtitle + ` (${currentQuestionIndex + 1}/${questions.length})`;

            const contentEl = document.getElementById('question-content');
            contentEl.innerHTML = '';

            if (current.type === 'sound' || current.type === 'sound-complete') {
                contentEl.innerHTML = `
                    <button onclick="playSound()" class="sound-play-button">
                        <i class="fas fa-volume-up" style="font-size: 3rem; color: white;"></i>
                    </button>
                    <div class="animal-options-container">
                        ${current.options.map(opt => `
                            <div onclick="handleSelection('${opt.value}')" class="animal-option ${selectedAnswer === opt.value ? 'selected' : ''}">
                                <span class="animal-emoji">${opt.emoji}</span>
                                <span class="animal-name">${opt.label || opt.animal}</span>
                            </div>`).join('')}
                    </div>`;
            } else if (current.type === 'sequence' || current.type === 'drag-sequence') {
                contentEl.innerHTML = `
                    <div class="sequence-slots">
                        ${Array(current.correct.length).fill().map((_, i) => {
                            const val = sequenceAnswer[i];
                            return val
                                ? `<div class="sequence-box filled">${val}<button class="remove-slot-btn" data-slot-index="${i}">×</button></div>`
                                : `<div class="sequence-box drop-zone" data-slot-index="${i}"></div>`;
                        }).join('')}
                    </div>
                    <div class="options-pool">
                        ${current.options.filter(opt => !sequenceAnswer.includes(opt)).map(opt =>
                            `<div class="draggable-item" data-value="${opt}">${opt}</div>`).join('')}
                    </div>`;
            } else if (current.type === 'complete-sequence') {
                const optionsMap = {};
                current.options.forEach(opt => optionsMap[opt.value] = opt.emoji);
                let slotIdx = 0;
                const sequenceHtml = current.sequence.map(item => {
                    if (item === '?') {
                        const idx = slotIdx++;
                        const val = sequenceAnswer[idx];
                        return val
                            ? `<div class="sequence-box filled">${optionsMap[val] || val}<button class="remove-slot-btn" data-slot-index="${idx}">×</button></div>`
                            : `<div class="sequence-box drop-zone" data-slot-index="${idx}"></div>`;
                    } else {
                        return `<div class="sequence-box fixed">${item}</div>`;
                    }
                }).join('');
                contentEl.innerHTML = `
                    <div class="sequence-slots">${sequenceHtml}</div>
                    <div class="options-pool">
                        ${current.options.filter(opt => !sequenceAnswer.includes(opt.value)).map(opt =>
                            `<div class="draggable-item" data-value="${opt.value}">${opt.emoji}</div>`).join('')}
                    </div>`;
            } else if (current.type === 'image-to-word') {
                contentEl.innerHTML = `
                    <div style="text-align: center; margin: 2rem 0;">
                        <div style="font-size: 8rem; margin-bottom: 2rem;">${current.image}</div>
                    </div>
                    <div class="image-options-container">
                        ${current.options.map(word =>
                            `<div onclick="handleSelection('${word}')" class="image-option ${selectedAnswer === word ? 'selected' : ''}">
                                <span class="image-label">${word}</span>
                            </div>`).join('')}
                    </div>`;
            } else if (current.type === 'word-to-image') {
                const pair = current.pairs[current.currentPair];
                contentEl.innerHTML = `
                    <div style="text-align: center; margin: 2rem 0;">
                        <div style="font-size: 2rem; font-weight: 700; margin-bottom: 2rem; color: var(--gray-800);">${pair.word}</div>
                        <div style="font-size: 8rem; margin-bottom: 2rem;">${pair.image}</div>
                        <p style="color: var(--gray-600); margin-bottom: 2rem;">${I18n.t('quiz.is_correct')}</p>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <button onclick="handlePairAnswer(true)" class="action-button" style="background: linear-gradient(135deg, var(--green-500), var(--green-600)); margin: 0;">✓ ${I18n.t('quiz.yes')}</button>
                        <button onclick="handlePairAnswer(false)" class="action-button" style="background: linear-gradient(135deg, var(--red-500), #dc2626); margin: 0;">✗ ${I18n.t('quiz.no')}</button>
                    </div>`;
            } else if (current.type === 'order-words') {
                if (current.audioText) contentEl.innerHTML = `<button onclick="playSound()" class="sound-play-button"><i class="fas fa-volume-up" style="font-size: 3rem;"></i></button>`;
                contentEl.innerHTML += `
                    <div class="word-order-slots">
                        ${Array(current.correct.length).fill().map((_, i) => {
                            const val = wordOrderAnswer[i];
                            return val
                                ? `<div class="word-slot filled">${val}<button class="remove-slot-btn" data-slot-index="${i}">×</button></div>`
                                : `<div class="word-slot drop-zone" data-slot-index="${i}"></div>`;
                        }).join('')}
                    </div>
                    <div class="word-options-pool">
                        ${current.words.filter(w => !wordOrderAnswer.includes(w)).map(word =>
                            `<div class="draggable-item" data-value="${word}">${word}</div>`).join('')}
                    </div>`;
            }

            attachDragAndDropListeners();
            updateVerifyButtonState();
        }

        function updateVerifyButtonState() {
            const current = questions[currentQuestionIndex];
            let isComplete = false;
            if (['sequence', 'drag-sequence', 'complete-sequence'].includes(current.type)) {
                isComplete = sequenceAnswer.every(v => v !== null);
            } else if (current.type === 'order-words') {
                isComplete = wordOrderAnswer.every(v => v !== null);
            } else if (current.type === 'word-to-image') {
                isComplete = pairAnswers.length === current.pairs.length;
            } else {
                isComplete = selectedAnswer !== null;
            }
            document.getElementById('verify-button').disabled = !isComplete;
        }

        function attachDragAndDropListeners() {
            const content = document.getElementById('question-content');
            if (!content) return;
            content.querySelectorAll('.draggable-item').forEach(item => {
                item.draggable = true;
                item.ondragstart = (e) => { draggedValue = e.target.dataset.value; e.target.classList.add('dragging'); };
                item.ondragend = (e) => { e.target.classList.remove('dragging'); };
            });
            content.querySelectorAll('.drop-zone').forEach(zone => {
                zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drag-over'); };
                zone.ondragleave = () => zone.classList.remove('drag-over');
                zone.ondrop = (e) => {
                    e.preventDefault(); zone.classList.remove('drag-over');
                    if (draggedValue) {
                        const slotIndex = parseInt(zone.dataset.slotIndex);
                        if (['sequence', 'drag-sequence', 'complete-sequence'].includes(currentQuestionType)) {
                            sequenceAnswer[slotIndex] = draggedValue;
                        } else if (currentQuestionType === 'order-words') {
                            wordOrderAnswer[slotIndex] = draggedValue;
                        }
                        draggedValue = null;
                        updateVerifyButtonState();
                        render();
                    }
                };
            });
            content.querySelectorAll('.remove-slot-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const slotIndex = parseInt(btn.dataset.slotIndex);
                    if (['sequence', 'drag-sequence', 'complete-sequence'].includes(currentQuestionType)) {
                        sequenceAnswer[slotIndex] = null;
                    } else if (currentQuestionType === 'order-words') {
                        wordOrderAnswer[slotIndex] = null;
                    }
                    updateVerifyButtonState();
                    render();
                };
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadQuizProgress();
            render();
        });
    </script>
</body>
</html>
