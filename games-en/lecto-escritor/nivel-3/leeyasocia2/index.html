<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read and Match 2 - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title">Read and Match 2</h1>
            <div class="game-info">
                <span id="score-display">0 points</span>
                <span class="difficulty-badge" id="difficulty-badge">Normal</span>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">5</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="lee-card">
                <h2>Read the sentence and select the correct image</h2>

                <div class="sentence-display-container">
                    <div class="sentence-display" id="sentence-display"></div>
                    <button id="read-button" class="read-button">
                        <i class="fas fa-volume-up"></i> Listen
                    </button>
                </div>

                <div id="word-difficulty" class="word-difficulty hidden">
                    <div class="difficulty-header">
                        <i class="fas fa-lightbulb"></i> Tricky words:
                    </div>
                    <div id="difficult-words" class="difficult-words-list"></div>
                </div>

                <div class="images-section">
                    <div class="images-label">Select the matching image:</div>
                    <div id="images-container" class="images-container"></div>
                </div>

                <div class="action-controls">
                    <button id="hint-button" class="action-button hint">
                        <i class="fas fa-lightbulb"></i> Hint
                    </button>
                    <button id="check-button" class="action-button primary">
                        <i class="fas fa-check"></i> Check
                    </button>
                    <button id="reset-button" class="action-button blue">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>

                <div id="feedback" class="feedback hidden"></div>

                <div id="explanation" class="explanation hidden">
                    <h3>Explanation</h3>
                    <p id="explanation-text"></p>
                </div>
            </div>

            <div class="instructions-card">
                <p>💡 <span style="font-weight: 700;">Tip:</span> Read the sentence carefully. You can listen to it by pressing the audio button. Then select the image that best represents it.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
