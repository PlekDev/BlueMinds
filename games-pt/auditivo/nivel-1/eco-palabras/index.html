<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Eco das Palavras - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">O Eco das Palavras</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
            </div>
        </header>

        <main class="game-content">
            <!-- Progresso -->
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                  <div class="high-score-container">
                      <span>🏆 Recorde: </span>
                      <span id="high-score-text">Carregando...</span>
                  </div>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Exibição de Áudio -->
            <div class="audio-card" id="audio-card">
                <h2>Repita a palavra</h2>

                <div id="difficulty-badge" class="difficulty-badge"></div>

                <div id="image-display" class="image-display">
                    <img id="current-image" src="" alt="Imagem para associar">
                </div>

                <div class="audio-controls">
                    <button id="play-button" class="audio-button primary">
                        <i class="fas fa-volume-up"></i> Ouvir palavra
                    </button>
                    <button id="record-button" class="audio-button red">
                        <i class="fas fa-microphone"></i> Gravar minha voz
                    </button>
                </div>

                <div id="recorded-text" class="recorded-text">
                    <p>O que você gravou:</p>
                    <p id="recorded-text-content"></p>
                </div>

                <div id="similarity-meter" class="similarity-meter">
                    <div class="similarity-label">Similaridade:</div>
                    <div class="similarity-bar">
                        <div id="similarity-fill" class="similarity-fill"></div>
                    </div>
                    <div id="similarity-text" class="similarity-text">0%</div>
                </div>

                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>
            </div>

            <!-- Instruções -->
            <div class="instructions-card">
                <p>
                    💡 <span style="font-weight: 700;">Dica:</span> Ouça com atenção a palavra e tente repeti-la da forma mais parecida possível.
                </p>
            </div>
        </main>
    </div>
    <script src="../../../../api.js"></script>
    <script src="pronunciation-analyzer.js"></script>
    <script src="script.js"></script>
</body>
</html>
