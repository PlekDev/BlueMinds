<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order the Story - BlueMinds AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title"><i class="fas fa-stream"></i> Order the Story AI</h1>
            <div class="ai-status">
                <span id="score-display">0 points</span>
                <div class="ai-indicator" title="Adaptive AI active">
                    <i class="fas fa-robot"></i>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">5</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="game-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>
                <div id="narrative-hint" class="narrative-hint" style="display: none;"></div>

                <h2 id="sequence-title">Order the correct sequence!</h2>
                
                <div class="sequence-display" id="sequence-display"></div>

                <p style="font-size: 16px; margin-bottom: 15px; color: #777;">Drag or click the images in the correct order:</p>
                <div class="options-display" id="options-display"></div>

                <div class="action-buttons">
                    <button class="action-button primary" onclick="checkSequence()">
                        <i class="fas fa-check"></i> Check
                    </button>
                    <button class="action-button secondary" onclick="resetSequence()">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>

                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>

                <div id="ai-analysis" class="ai-analysis">
                    <strong>📊 AI Analysis:</strong> <span id="analysis-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>Adaptive AI:</strong> The system automatically adjusts the number of images and complexity based on your narrative comprehension and sequencing.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
