<!DOCTYPE html>
<html lang="es" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Eco de las Palabras - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css";
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> <span data-i18n="game_ui.back">Volver</span>
                </button>
            </div>
            <h1 class="game-title" data-i18n="game.eco_palabras">El Eco de las Palabras</h1>
            <div class="game-info" style="display:flex;align-items:center;gap:15px;"><div id="lang-picker-anchor"></div>
                <span id="score-display" data-i18n="game_ui.zero_points">0 puntos</span>
            </div>
        </header>

        <main class="game-content">
            <!-- Progress -->
            <div class="progress-card">
                <div class="progress-header">
                    <span data-i18n="game_ui.round_word">Ronda</span> <span id="current-round">1</span> <span data-i18n="game_ui.of">de</span> <span id="total-rounds">5</span>
                    <span id="score" data-i18n="game_ui.zero_points">0 puntos</span>
                  <div class="high-score-container">
                      <span data-i18n="game_ui.record">🏆 Récord: </span>
                      <span id="high-score-text"><span data-i18n="game_ui.loading">Cargando...</span></span>
                  </div>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Audio Display -->
            <div class="audio-card" id="audio-card">
                <h2 data-i18n="game_ui.repeat_word">Repite la palabra</h2>
                
                <div id="difficulty-badge" class="difficulty-badge"></div>

                <div id="image-display" class="image-display">
                    <img id="current-image" src="" alt="Imagen para asociar">
                </div>
                
                <div class="audio-controls">
                    <button id="play-button" class="audio-button primary">
                        <i class="fas fa-volume-up"></i><span data-i18n="game_ui.listen_word">Escuchar palabra</span></button>
                    <button id="record-button" class="audio-button red">
                        <i class="fas fa-microphone"></i><span data-i18n="game_ui.record_voice">Grabar mi voz</span></button>
                </div>

                <div id="recorded-text" class="recorded-text">
                    <p>Lo que grabaste:</p>
                    <p id="recorded-text-content"></p>
                </div>
                
                <div id="similarity-meter" class="similarity-meter">
                    <div class="similarity-label">Similitud:</div>
                    <div class="similarity-bar">
                        <div id="similarity-fill" class="similarity-fill"></div>
                    </div>
                    <div id="similarity-text" class="similarity-text">0%</div>
                </div>
                
                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>
            </div>

            <!-- Instructions -->
            <div class="instructions-card">
                <p>
                    💡 <span style="font-weight: 700;">Tip:</span> <span data-i18n="game.eco_palabras.tip">Escucha atentamente la palabra y trata de repetirla lo más parecido posible.</span>
                </p>
            </div>
        </main>
    </div>
    <script src="../../../../api.js"></script>
<script src="pronunciation-analyzer.js"></script>
<script src="script.js"></script>
    <script src="../../../../js/game-translations.js"></script>
    <script src="../../../../js/i18n.js"></script>
</body>
</html>
