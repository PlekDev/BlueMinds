<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorize e Encontre - BlueMinds IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Memorize e Encontre IA</h1>
            <div class="ai-status">
                <span id="score-display">0 pontos</span>
                <button id="audio-toggle" onclick="toggleAudio()" title="Ativar/Desativar áudio">
                    <i class="fas fa-volume-up"></i>
                </button>
                <div class="ai-indicator" title="IA adaptativa ativa">
                    <i class="fas fa-robot"></i>
                    <span>IA</span>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="game-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>
                <h2>Memorize a imagem!</h2>

                <div id="image-display" class="image-display">
                    <div class="image-container">
                        <img id="current-image" src="" alt="Imagem para memorizar">
                    </div>
                    <div id="word-label" class="word-label"></div>
                </div>

                <div id="countdown-display" class="countdown hidden-text">
                    <span id="countdown">5</span>
                </div>

                <div id="options-section" style="display: none;">
                    <p style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">Qual era a imagem?</p>
                    <div id="options-container" class="options-container"></div>
                </div>

                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>

                <div id="ai-analysis" class="ai-analysis">
                    <strong>📊 Análise IA:</strong> <span id="analysis-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>IA Adaptativa:</strong> O sistema ajusta automaticamente o tempo de memorização de acordo com seu desempenho.</p>
            </div>
        </main>
    </div>

    <script>
        class AudioManager {
            constructor() {
                this.synth = window.speechSynthesis;
                this.audioEnabled = true;
            }
            speak(text, rate = 1) {
                if (!this.audioEnabled) return;
                this.synth.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = rate;
                utterance.lang = 'pt-BR';
                this.synth.speak(utterance);
            }
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                return this.audioEnabled;
            }
        }

        class AIMemoryGame {
            constructor() {
                this.currentRound = 0;
                this.score = 0;
                this.currentImage = null;
                this.options = [];
                this.showFeedback = false;
                this.isMemorizingPhase = true;
                this.timeRemaining = 5;
                this.audioManager = new AudioManager();

                this.playerMemoryScore = 0;
                this.exposureTime = 5;
                this.failedImages = [];
                this.imageStats = {};
                this.difficulty = 'normal';
                this.consecutiveCorrect = 0;
                this.consecutiveWrong = 0;
                this.responseTime = 0;
                this.startMemoryTime = 0;

                this.difficultyLevels = {
                    easy: { distractors: 2, time: 6 },
                    normal: { distractors: 2, time: 5 },
                    hard: { distractors: 3, time: 4 }
                };

                this.images = [
                    { src: "https://tse2.mm.bing.net/th/id/OIP.iremaMYVEQmKqX0XkISwQgAAAA?rs=1&pid=ImgDetMain&o=7&rm=3?w=1380", name: "gato", category: "animal" },
                    { src: "https://tse4.mm.bing.net/th/id/OIP.g20yYrHhw8E7FZWE5yf3MwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3?w=1380", name: "cachorro", category: "animal" },
                    { src: "https://tse2.mm.bing.net/th/id/OIP.vluLeVl5ITns3V9R5ptDZgHaFc?rs=1&pid=ImgDetMain&o=7&rm=3?w=1380", name: "casa", category: "objeto" },
                    { src: "https://img.freepik.com/vector-premium/dibujo-dibujos-animados-flor-rosa-centro-amarillo_1167562-3170.jpg?w=1380", name: "flor", category: "natureza" },
                    { src: "https://tse1.mm.bing.net/th/id/OIP.J48Rm8Jv492HD2uEpSw6uwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3?w=1380", name: "árvore", category: "natureza" },
                    { src: "https://th.bing.com/th/id/OIP.KvENQqXrbmaCQ9st9X_kkQHaHH?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3?w=1380", name: "sol", category: "natureza" }
                ];

                this.totalRounds = 5;

                this.images.forEach(img => {
                    this.imageStats[img.name] = { attempts: 0, correct: 0, wrong: 0, avgResponseTime: 0 };
                });
            }

            announceGameStart() {
                this.audioManager.speak("Bem-vindo ao Memorize e Encontre. Memorize a imagem que aparece e selecione a opção correta. Você tem cinco rodadas. Boa sorte!", 0.9);
            }

            announceImage() {
                this.audioManager.speak(`Memorize esta imagem: ${this.currentImage.name}`, 0.95);
            }

            analyzePerformance(isCorrect, responseTime) {
                const stats = this.imageStats[this.currentImage.name];
                stats.attempts++;
                stats.avgResponseTime = (stats.avgResponseTime + responseTime) / 2;

                if (isCorrect) {
                    stats.correct++;
                    this.consecutiveCorrect++;
                    this.consecutiveWrong = 0;
                } else {
                    stats.wrong++;
                    this.consecutiveWrong++;
                    this.consecutiveCorrect = 0;
                    if (!this.failedImages.includes(this.currentImage.name)) {
                        this.failedImages.push(this.currentImage.name);
                    }
                }

                this.playerMemoryScore = (this.score / ((this.currentRound + 1) * 20)) * 100;
                this.adjustDifficulty();
            }

            adjustDifficulty() {
                if (this.consecutiveCorrect >= 3) {
                    this.difficulty = 'hard';
                    this.exposureTime = Math.max(3, this.exposureTime - 1);
                } else if (this.consecutiveWrong >= 2) {
                    this.difficulty = 'easy';
                    this.exposureTime = Math.min(7, this.exposureTime + 1);
                } else {
                    this.difficulty = 'normal';
                    this.exposureTime = 5;
                }
                this.showDifficultyIndicator();
            }

            showDifficultyIndicator() {
                const indicator = document.getElementById('difficulty-indicator');
                const levels = {
                    easy: '⭐ Dificuldade: FÁCIL',
                    normal: '⭐⭐ Dificuldade: NORMAL',
                    hard: '⭐⭐⭐ Dificuldade: DIFÍCIL'
                };
                indicator.textContent = levels[this.difficulty];
                indicator.style.display = 'block';
            }

            selectOptionsIntelligently(correctImage) {
                const difficulty = this.difficultyLevels[this.difficulty];
                let distractors = [];

                if (this.failedImages.length > 0) {
                    distractors = this.images
                        .filter(img => img.name !== correctImage.name && this.failedImages.includes(img.name))
                        .slice(0, difficulty.distractors);
                }

                if (distractors.length < difficulty.distractors) {
                    const remaining = this.images
                        .filter(img => img.name !== correctImage.name && !distractors.find(d => d.name === img.name))
                        .sort(() => Math.random() - 0.5);
                    distractors = [...distractors, ...remaining.slice(0, difficulty.distractors - distractors.length)];
                }

                return [correctImage, ...distractors].sort(() => Math.random() - 0.5);
            }

            startNewRound() {
                let randomImage;
                if (this.failedImages.length > 0 && Math.random() > 0.5) {
                    randomImage = this.images.find(img => img.name === this.failedImages[0]);
                    this.failedImages.shift();
                } else {
                    randomImage = this.images[Math.floor(Math.random() * this.images.length)];
                }

                this.currentImage = randomImage;
                this.options = this.selectOptionsIntelligently(randomImage);
                this.showFeedback = false;
                this.isMemorizingPhase = true;
                this.timeRemaining = this.exposureTime;
                this.startMemoryTime = Date.now();

                this.updateUI();
                this.announceImage();
                this.startMemorizingPhase();
            }

            updateUI() {
                document.getElementById('current-round').textContent = this.currentRound + 1;
                document.getElementById('total-rounds').textContent = this.totalRounds;
                document.getElementById('score').textContent = this.score + ' pontos';
                document.getElementById('score-display').textContent = this.score + ' pontos';

                const progress = ((this.currentRound + 1) / this.totalRounds) * 100;
                document.getElementById('progress-fill').style.width = progress + '%';

                document.getElementById('current-image').src = this.currentImage.src;
                document.getElementById('word-label').textContent = this.currentImage.name;
                document.getElementById('image-display').classList.remove('hidden');
                document.getElementById('options-section').style.display = 'none';
                document.getElementById('countdown-display').classList.remove('hidden-text');
                document.getElementById('feedback').classList.remove('show');
                document.getElementById('ai-analysis').classList.remove('show');
            }

            startMemorizingPhase() {
                const countdownText = document.getElementById('countdown');
                const interval = setInterval(() => {
                    countdownText.textContent = this.timeRemaining;
                    this.timeRemaining--;
                    if (this.timeRemaining < 0) {
                        clearInterval(interval);
                        document.getElementById('image-display').classList.add('hidden');
                        document.getElementById('countdown-display').classList.add('hidden-text');
                        this.showOptionsPhase();
                    }
                }, 1000);
            }

            showOptionsPhase() {
                this.isMemorizingPhase = false;
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';

                this.options.forEach(image => {
                    const button = document.createElement('button');
                    button.className = 'option-button';
                    button.textContent = image.name;
                    button.onclick = () => this.handleAnswer(image.name);
                    optionsContainer.appendChild(button);
                });

                document.getElementById('options-section').style.display = 'block';
                this.audioManager.speak('Qual era a imagem?', 0.95);
            }

            handleAnswer(selectedName) {
                if (this.showFeedback) return;

                this.responseTime = (Date.now() - this.startMemoryTime) / 1000;
                const isCorrect = selectedName === this.currentImage.name;
                const feedbackElement = document.getElementById('feedback');
                const feedbackText = document.getElementById('feedback-text');

                this.analyzePerformance(isCorrect, this.responseTime);

                if (isCorrect) {
                    this.score += 20;
                    feedbackText.textContent = "Correto! 🎉";
                    feedbackElement.className = 'feedback correct show';
                    this.audioManager.speak('Correto! Excelente memória.', 0.95);
                } else {
                    feedbackText.textContent = `Não foi dessa vez. Era: ${this.currentImage.name} 😊`;
                    feedbackElement.className = 'feedback incorrect show';
                    this.audioManager.speak(`Incorreto. A resposta correta era: ${this.currentImage.name}`, 0.9);
                }

                this.showFeedback = true;
                document.getElementById('score').textContent = this.score + ' pontos';
                document.getElementById('score-display').textContent = this.score + ' pontos';
                this.showAIAnalysis();

                setTimeout(() => {
                    if (this.currentRound + 1 >= this.totalRounds) {
                        this.completeGame();
                    } else {
                        this.currentRound++;
                        this.startNewRound();
                    }
                }, 2500);
            }

            showAIAnalysis() {
                const analysisEl = document.getElementById('ai-analysis');
                const analysisText = document.getElementById('analysis-text');
                let analysis = '';

                if (this.responseTime < 2) analysis += '⚡ Resposta muito rápida. ';
                else if (this.responseTime > 4) analysis += '🤔 Resposta lenta. ';

                if (this.consecutiveCorrect > 0) analysis += `✅ ${this.consecutiveCorrect} acerto(s) consecutivo(s). `;
                if (this.difficulty === 'hard') analysis += '📈 Nível aumentado para DIFÍCIL. ';
                else if (this.difficulty === 'easy') analysis += '📉 Nível reduzido para FÁCIL. ';

                analysisText.textContent = analysis || 'Memória em desenvolvimento...';
                analysisEl.classList.add('show');
            }

            completeGame() {
                const gameCard = document.querySelector('.game-card');
                const avgAccuracy = ((this.score / (this.totalRounds * 20)) * 100).toFixed(1);

                let performanceMessage = 'Excelente memória visual! 🏆';
                if (avgAccuracy < 60) performanceMessage = 'Continue praticando para melhorar sua memória! 💪';
                else if (avgAccuracy < 80) performanceMessage = 'Muito bom trabalho! Sua memória está melhorando. 🌟';

                this.audioManager.speak(`Jogo concluído. Sua pontuação final é de ${this.score} pontos com precisão de ${avgAccuracy} por cento.`, 0.9);

                gameCard.innerHTML = `
                    <h2>Jogo Concluído!</h2>
                    <div style="font-size: 80px; margin: 30px 0;">🎉</div>
                    <div style="background: linear-gradient(135deg, #0066CC 0%, #0099FF 100%); color: white; padding: 20px; border-radius: 12px; margin: 20px 0;">
                        <div style="font-size: 24px; font-weight: 700; margin-bottom: 10px;">Sua pontuação final: ${this.score} pontos</div>
                        <div style="font-size: 18px; opacity: 0.9;">Precisão: ${avgAccuracy}%</div>
                    </div>
                    <div style="background: rgba(0, 102, 204, 0.1); border-left: 4px solid #0066CC; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; color: #1F2937; font-size: 14px;">
                        <strong>📊 Análise Final de IA:</strong>
                        <div style="margin-top: 10px;">
                            <div>✓ Capacidade de memória: ${this.playerMemoryScore.toFixed(0)}%</div>
                            <div>✓ Tempo de reação médio: ${this.responseTime.toFixed(2)}s</div>
                            <div>✓ Imagens que precisam de prática: ${this.failedImages.length > 0 ? this.failedImages.join(', ') : 'Nenhuma'}</div>
                        </div>
                    </div>
                    <div style="color: var(--primary-blue); font-size: 18px; font-weight: 600; margin: 15px 0;">${performanceMessage}</div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px;">
                        <button style="background: linear-gradient(135deg, #0066CC 0%, #0099FF 100%); color: white; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;" onclick="location.reload()">Jogar Novamente</button>
                        <button style="background-color: #00B4D8; color: white; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;" onclick="goToMainPage()">Voltar ao Menu</button>
                    </div>
                `;
            }
        }

        const game = new AIMemoryGame();

        document.addEventListener('DOMContentLoaded', () => {
            game.announceGameStart();
            setTimeout(() => { game.startNewRound(); }, 3000);
        });

        function toggleAudio() {
            const enabled = game.audioManager.toggleAudio();
            const btn = document.getElementById('audio-toggle');
            if (btn) btn.innerHTML = enabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        }

        function goToMainPage() {
            window.location.href = 'https://plekdev.github.io/BlueMinds/selectores/selector-visual.html';
        }
    </script>
</body>
</html>
