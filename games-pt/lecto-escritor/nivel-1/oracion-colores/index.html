<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte a Frase com Cores - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Monte a Frase</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
                <span class="difficulty-badge" id="difficulty-badge">Normal</span>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="sentence-card">
                <h2>Monte a frase correta</h2>

                <div id="image-display" class="image-display">
                    <img id="sentence-image" src="" alt="Imagem para a frase">
                </div>

                <div id="order-hint" class="order-hint hidden"></div>

                <div class="sentence-container">
                    <div class="sentence-label">Arraste as palavras na ordem correta:</div>
                    <div id="sentence-drop-zone" class="sentence-drop-zone">
                        <!-- Slots gerados dinamicamente -->
                    </div>
                </div>

                <div class="words-container">
                    <div class="words-label">Palavras disponíveis:</div>
                    <div id="words-bank" class="words-bank"></div>
                </div>

                <div class="action-controls">
                    <button id="hint-button" class="action-button hint" title="Ver dica da ordem">
                        <i class="fas fa-lightbulb"></i> Dica
                    </button>
                    <button id="check-button" class="action-button primary">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button id="reset-button" class="action-button blue">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>

                <div id="feedback" class="feedback hidden"></div>
            </div>

            <div class="instructions-card">
                <p>💡 <span style="font-weight: 700;">Dica:</span> Arraste as palavras na ordem correta para formar uma frase que descreva a imagem. Use a dica se precisar.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
