<!DOCTYPE html>
<html lang="es" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completa la Oración Auditiva - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> <span data-i18n="game_ui.back">Volver</span>
                </button>
            </div>
            <h1 class="game-title" data-i18n="game.completa_oracion">Completa la Oración</h1>
            <div class="game-info" style="display:flex;align-items:center;gap:15px;"><div id="lang-picker-anchor"></div>
                <span id="score-display" data-i18n="game_ui.zero_points">0 puntos</span>
            </div>
        </header>

        <div class="progress-card">
            <div class="progress-header">
                <span>Pregunta <span id="current-question">1</span>de <span id="total-questions">5</span></span>
                <span id="score" data-i18n="game_ui.zero_points">0 puntos</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="main-card" id="main-card">
            <h2 data-i18n="game_ui.listen_complete">Escucha y completa la oración</h2>

            <div class="difficulty-info">
                <div id="difficulty-badge" class="difficulty-badge adaptive">Comprensión Auditiva</div>
                <p class="instruction-text" id="instruction-text">Escucha la oración y elige la imagen que la completa</p>
            </div>

            <div class="audio-controls">
                <button id="play-button" class="btn primary">
                    <i class="fas fa-volume-up"></i><span data-i18n="game_ui.listen_sentence">Escuchar Oración</span></button>
                <button id="repeat-button" class="btn secondary" style="display: none;">
                    <i class="fas fa-redo"></i> Repetir
                </button>
            </div>

            <div class="visual-support" id="visual-support" style="display: none;">
                <div class="visual-support-content">
                    <img id="visual-image" src="" alt="Apoyo visual">
                </div>
            </div>

            <div class="options-grid" id="options-grid">
                <!-- Se genera dinámicamente -->
            </div>

            <div id="feedback" class="feedback">
                <div class="feedback-message" id="feedback-message"></div>
                <div class="feedback-detail" id="feedback-detail"></div>
                <div class="analysis-box" id="analysis-box"></div>
            </div>
        </div>

        <div class="instructions-card">
            <p>
                💡 <span style="font-weight: 700;">Tip:</span> <span data-i18n="game_ui.tip_3">Escucha atentamente la oración y piensa qué palabra tiene más sentido. ¡Puedes escuchar de nuevo si lo necesitas!</span></p>
        </div>
    </div>

    <script src="../../../../api.js"></script>
    <script src="script.js"></script>
    <script src="../../../../js/game-translations.js"></script>
    <script src="../../../../js/i18n.js"></script>
</body>
</html>
