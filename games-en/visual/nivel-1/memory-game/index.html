<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BlueMinds AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title">Memory Game AI</h1>
            <div class="ai-status">
                <span id="score-display">0 points</span>
                <div class="ai-indicator" title="Adaptive AI active">
                    <i class="fas fa-robot"></i>
                    <span>AI</span>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Level <span id="current-level">1</span> of <span id="max-level">5</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="status-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>
                
                <div id="status-message" class="status-message">
                    👀 Watch the sequence!
                </div>
                
                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>

                <div class="sequence-info">
                    <span class="info-label">Sequence:</span> 
                    <span id="sequence-progress" class="info-number">0</span> / 
                    <span id="sequence-length" class="info-number">0</span>
                </div>
            </div>

            <div class="color-card">
                <div class="color-grid" id="color-grid">
                    <button class="color-button" data-color="🔴" onclick="handleColorClick('🔴')">🔴</button>
                    <button class="color-button" data-color="🔵" onclick="handleColorClick('🔵')">🔵</button>
                    <button class="color-button" data-color="🟢" onclick="handleColorClick('🟢')">🟢</button>
                    <button class="color-button" data-color="🟡" onclick="handleColorClick('🟡')">🟡</button>
                    <button class="color-button" data-color="🟣" onclick="handleColorClick('🟣')">🟣</button>
                    <button class="color-button" data-color="🟠" onclick="handleColorClick('🟠')">🟠</button>
                </div>
            </div>

            <div id="ai-analysis" class="ai-analysis">
                <strong>📊 AI Analysis:</strong> <span id="analysis-text"></span>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>Adaptive AI:</strong> The system adjusts the speed and length of the sequence based on your pattern memory performance.</p>
            </div>
        </main>
    </div>

    <script src="../../../../api.js"></script>
    <script src="script.js"></script>
</body>
</html>
