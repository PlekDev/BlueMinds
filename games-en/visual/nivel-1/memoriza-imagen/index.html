<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorize & Find - BlueMinds AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title">Memorize & Find AI</h1>
            <div class="ai-status">
                <span id="score-display">0 points</span>
                <button id="audio-toggle" onclick="toggleAudio()" title="Enable/Disable audio">
                    <i class="fas fa-volume-up"></i>
                </button>
                <div class="ai-indicator" title="Adaptive AI active">
                    <i class="fas fa-robot"></i>
                    <span>AI</span>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">5</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="game-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>

                <h2>Memorize the image!</h2>

                <div id="image-display" class="image-display">
                    <div class="image-container">
                        <img id="current-image" src="" alt="Image to memorize">
                    </div>
                    <div id="word-label" class="word-label"></div>
                </div>

                <div id="countdown-display" class="countdown hidden-text">
                    <span id="countdown">5</span>
                </div>

                <div id="options-section" style="display: none;">
                    <p style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">Which was the image?</p>
                    <div id="options-container" class="options-container"></div>
                </div>

                <div id="feedback" class="feedback">
                    <span id="feedback-text"></span>
                </div>

                <div id="ai-analysis" class="ai-analysis">
                    <strong>📊 AI Analysis:</strong> <span id="analysis-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>Adaptive AI:</strong> The system automatically adjusts the memorization time based on your performance.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
