<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordene a História - BlueMinds IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title"><i class="fas fa-stream"></i> Ordene a História IA</h1>
            <div class="ai-status">
                <span id="score-display">0 pontos</span>
                <div class="ai-indicator" title="IA adaptativa ativa">
                    <i class="fas fa-robot"></i>
                </div>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="game-card">
                <div id="difficulty-indicator" class="difficulty-indicator" style="display: none;"></div>
                <div id="narrative-hint" class="narrative-hint" style="display: none;"></div>
                <h2 id="sequence-title">Ordene a sequência correta!</h2>
                <div class="sequence-display" id="sequence-display"></div>
                <p style="font-size: 16px; margin-bottom: 15px; color: #777;">Arraste ou clique nas imagens na ordem correta:</p>
                <div class="options-display" id="options-display"></div>
                <div class="action-buttons">
                    <button class="action-button primary" onclick="checkSequence()">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button class="action-button secondary" onclick="resetSequence()">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>
                <div id="feedback" class="feedback"><span id="feedback-text"></span></div>
                <div id="ai-analysis" class="ai-analysis">
                    <strong>📊 Análise IA:</strong> <span id="analysis-text"></span>
                </div>
            </div>

            <div class="instructions-card">
                <p>🤖 <strong>IA Adaptativa:</strong> O sistema ajusta automaticamente a quantidade de imagens e a complexidade de acordo com sua compreensão narrativa e sequenciação.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
