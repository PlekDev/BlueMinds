<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Game - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            <h1 class="game-title">Pattern Game</h1>
            <div class="game-info">
                <span id="score-display">0 points</span>
                <button class="audio-toggle" id="audioToggle" title="Enable/Disable audio">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </header>

        <main class="game-content">
            <!-- Progress -->
            <div class="progress-card">
                <div class="progress-header">
                    <span>Round <span id="current-round">1</span> of <span id="total-rounds">5</span></span>
                    <span id="score">0 points</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Pattern Display -->
            <div class="pattern-card">
                <h2>What's missing in the pattern?</h2>
                
                <div id="pattern-display" class="pattern-display">
                    <!-- Pattern elements are generated dynamically -->
                </div>
                
                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>

                <div id="options-container" class="options-container">
                    <!-- Options are generated dynamically -->
                </div>
            </div>

            <!-- Instructions -->
            <div class="instructions-card">
                <p>
                    💡 <span class="font-bold">Tip:</span> Look for what repeats in the pattern and complete the sequence.
                </p>
            </div>
        </main>
    </div>

    <script>
        // ===== AUDIO MANAGER =====
        class AudioManager {
            constructor() {
                this.synth = window.speechSynthesis;
                this.audioEnabled = true;
            }
            speak(text, rate = 1) {
                if (!this.audioEnabled) return;
                this.synth.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = rate;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                utterance.lang = 'en-US';
                this.synth.speak(utterance);
            }
            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                return this.audioEnabled;
            }
        }

        const audioManager = new AudioManager();

        document.getElementById('audioToggle').addEventListener('click', function() {
            const isEnabled = audioManager.toggleAudio();
            if (isEnabled) {
                this.innerHTML = '<i class="fas fa-volume-up"></i>';
                audioManager.speak('Audio enabled');
            } else {
                this.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
