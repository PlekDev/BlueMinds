<!DOCTYPE html>
<html lang="es" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arma la Oración con Colores - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> <span data-i18n="game_ui.back">Volver</span>
                </button>
            </div>
            <h1 class="game-title" data-i18n="game_ui.build_sentence">Arma la Oración</h1>
            <div class="game-info" style="display:flex;align-items:center;gap:15px;"><div id="lang-picker-anchor"></div>
                <span id="score-display" data-i18n="game_ui.zero_points">0 puntos</span>
                <span class="difficulty-badge" id="difficulty-badge">Normal</span>
            </div>
        </header>

        <main class="game-content">
            <div class="progress-card">
                <div class="progress-header">
                    <span data-i18n="game_ui.round_word">Ronda</span> <span id="current-round">1</span> <span data-i18n="game_ui.of">de</span> <span id="total-rounds">5</span>
                    <span id="score" data-i18n="game_ui.zero_points">0 puntos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div class="sentence-card">
                <h2>Arma la oración correcta</h2>
                
                <div id="image-display" class="image-display">
                    <img id="sentence-image" src="" alt="Imagen para la oración">
                </div>

                <div id="order-hint" class="order-hint hidden"></div>
                
                <div class="sentence-container">
                    <div class="sentence-label">Arrastra las palabras en orden:</div>
                    <div id="sentence-drop-zone" class="sentence-drop-zone">
                        <!-- Se generarán slots dinámicamente -->
                    </div>
                </div>
                
                <div class="words-container">
                    <div class="words-label">Palabras disponibles:</div>
                    <div id="words-bank" class="words-bank"></div>
                </div>
                
                <div class="action-controls">
                    <button id="hint-button" class="action-button hint" title="Ver pista del orden">
                        <i class="fas fa-lightbulb"></i> Pista
                    </button>
                    <button id="check-button" class="action-button primary">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button id="reset-button" class="action-button blue">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>
                
                <div id="feedback" class="feedback hidden"></div>
            </div>

            <div class="instructions-card">
                <p>💡 <span style="font-weight: 700;">Tip:</span> <span data-i18n="game_ui.tip_9">Arrastra las palabras en el orden correcto para formar una oración que describa la imagen. Usa la pista si lo necesitas.</span></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="../../../../js/game-translations.js"></script>
    <script src="../../../../js/i18n.js"></script>
</body>
</html>
