<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siga o Líder Simples - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Siga o Líder</h1>
            <div class="game-info">
                <span id="score-display">0 pontos</span>
            </div>
        </header>

        <main class="game-content">
            <!-- Progresso -->
            <div class="progress-card">
                <div class="progress-header">
                    <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">3</span></span>
                    <span id="score">0 pontos</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Card Principal do Jogo -->
            <div class="movement-card">
                <h2>Observe e Copie o Movimento 🎭</h2>

                <!-- Seção do Avatar Líder -->
                <div class="leader-section">
                    <div class="section-label">👨‍🏫 O Líder</div>
                    <div class="avatar-container">
                        <div id="avatar-leader" class="avatar leader">
                            <div class="avatar-head"></div>
                            <div class="avatar-body">
                                <div class="avatar-arm avatar-arm-left"></div>
                                <div class="avatar-arm avatar-arm-right"></div>
                                <div class="avatar-leg avatar-leg-left"></div>
                                <div class="avatar-leg avatar-leg-right"></div>
                            </div>
                        </div>
                    </div>
                    <div id="instruction-text" class="instruction-text">
                        Ouça a instrução
                    </div>
                </div>

                <!-- Controles -->
                <div class="action-controls">
                    <button id="play-button" class="action-button primary">
                        <i class="fas fa-play"></i> Mostrar Movimento
                    </button>
                    <button id="done-button" class="action-button blue" disabled>
                        <i class="fas fa-check"></i> Fiz!
                    </button>
                </div>

                <!-- Seção de Câmera e Análise -->
                <div class="camera-analysis-section">
                    <div class="camera-controls">
                        <button class="camera-btn start" id="startCameraBtn" onclick="startCamera()">
                            <i class="fas fa-video"></i> Iniciar Câmera
                        </button>
                        <button class="camera-btn stop" id="stopCameraBtn" onclick="stopCamera()" style="display: none;">
                            <i class="fas fa-stop"></i> Parar
                        </button>
                    </div>

                    <div class="camera-container">
                        <div class="camera-feed" id="cameraFeedContainer">
                            <video id="cameraFeed" style="display: none;"></video>
                            <span id="cameraPlaceholder">A câmera será aberta aqui</span>
                        </div>
                    </div>

                    <!-- Análise Simples -->
                    <div class="simple-analysis" id="simpleAnalysis" style="display: none;">
                        <h4>✨ Detecção de Movimento</h4>
                        <div class="analysis-item">
                            <span class="analysis-label">Movimento Detectado:</span>
                            <span class="analysis-value" id="movementDetected">--%</span>
                        </div>
                    </div>
                </div>

                <!-- Feedback -->
                <div id="feedback" class="feedback hidden">
                    <span id="feedback-text"></span>
                </div>
            </div>

            <!-- Instruções -->
            <div class="instructions-card">
                <p>
                    💡 <span class="font-bold">Como jogar:</span> Veja o avatar e faça o movimento que ele mostra. Abra a câmera para que possamos ver seu movimento.
                </p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
