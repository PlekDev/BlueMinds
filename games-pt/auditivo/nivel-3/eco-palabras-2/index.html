<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imitação de Animais - Neuro Play World</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="back-button">
                <button onclick="goToMainPage()">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
            <h1 class="game-title">Sons dos Animais</h1>
            <div class="game-info">
                <span id="score-display">Carregando recorde...</span>
            </div>
        </header>

        <div class="progress-card">
            <div class="progress-header">
                <span>Rodada <span id="current-round">1</span> de <span id="total-rounds">5</span></span>
                <span id="score">0 pontos</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="main-card" id="main-card">
            <h2>Ouça e imite o som</h2>

            <div class="difficulty-info">
                <div id="difficulty-badge" class="difficulty-badge adaptive">Discriminação Auditiva</div>
                <p class="instruction-text" id="instruction-text">Ouça o som do animal e repita</p>
            </div>

            <div class="animal-display" id="animal-display">
                <div class="animal-name-badge" id="animal-name">Carregando...</div>
                <div class="animal-image-container">
                    <img id="animal-image" src="" alt="Animal" class="animal-image">
                    <div class="mouth-animation" id="mouth-animation" style="display: none;">
                        <div class="mouth"></div>
                    </div>
                </div>
            </div>

            <div class="audio-controls">
                <button id="play-sound-button" class="btn primary">
                    <i class="fas fa-volume-up"></i> Ouvir Som
                </button>
                <button id="record-button" class="btn secondary" style="display: none;">
                    <i class="fas fa-microphone"></i> Gravar minha voz
                </button>
            </div>

            <div id="recorded-text" class="recorded-text" style="display: none;">
                <p>O que você gravou:</p>
                <p id="recorded-text-content"></p>
            </div>

            <div id="similarity-meter" class="similarity-meter" style="display: none;">
                <div class="similarity-label">Similaridade:</div>
                <div class="similarity-bar">
                    <div id="similarity-fill" class="similarity-fill"></div>
                </div>
                <div id="similarity-text" class="similarity-text">0%</div>
            </div>

            <div id="feedback" class="feedback">
                <div id="feedback-message" class="feedback-message"></div>
                <div id="feedback-detail" class="feedback-detail"></div>
                <div class="analysis-box" id="analysis-box"></div>
            </div>
        </div>

        <div class="instructions-card">
            <p>
                💡 <span style="font-weight: 700;">Dica:</span> Ouça com atenção o som do animal e tente imitá-lo. A IA vai te ajudar se for muito difícil!
            </p>
        </div>
    </div>

    <script src="../../../../api.js"></script>
    <script src="script.js"></script>
</body>
</html>
